<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Brotherhood | Craft Reference</title>
    <meta name="description" content="A reference for primitive crafting techniques.">
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Outfit:wght@400;700;900&family=JetBrains+Mono:wght@400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <!-- Main App -->
    <div id="app" class="blueprint-container">
        <button class="menu-toggle-btn" onclick="toggleSidebar()">
            <span class="hamburger-icon">☰</span>
        </button>
        <div class="sidebar-overlay" onclick="toggleSidebar()"></div>
        <aside class="sidebar" id="sidebar">
            <header class="sidebar-header">
                <div class="logo" onclick="goToHome()" style="cursor:pointer;">
                    <span class="logo-icon">📜</span>
                    <h1>Brotherhood</h1>
                </div>
            </header>
            <nav class="recipe-nav">
                <div class="nav-section">
                    <button class="add-blueprint-btn" onclick="openAddCraftModal()">
                        <span>📜</span> Add New Blueprint
                    </button>
                    <input type="text" id="sidebar-search" placeholder="🔍 Search blueprints..."
                        class="sidebar-search-input" oninput="handleSidebarSearch(this.value)">
                    <div id="stages-nav">
                        <!-- Navigation injected here -->
                    </div>
                </div>
            </nav>
            <footer class="sidebar-footer">
                <button class="footer-btn market-footer-btn" onclick="openMarketScanner()">
                    <span>🔍</span> Market Scanner
                </button>
                <button class="footer-btn logout-btn" onclick="handleLogout()">
                    <span>🚪</span> Logout
                </button>
            </footer>
        </aside>

        <main class="content">
            <div id="welcome-view" class="view active">
                <div class="blueprint-card hero">
                    <h2>Welcome to the Forge</h2>
                    <p>Use the sidebar to browse, add, or manage blueprints.</p>
                    <div class="quick-stats">
                        <div class="stat"><span id="blueprint-count">0</span> Blueprints</div>
                    </div>
                </div>
            </div>

            <div id="blueprint-view" class="view">
                <!-- Blueprint content injected here -->
            </div>

            <div id="admin-login-view" class="view">
                <!-- Admin login injected here -->
            </div>

            <div id="admin-view" class="view">
                <!-- Admin panel injected here -->
            </div>

            <div id="market-view" class="view">
                <!-- Market scanner injected here -->
            </div>
        </main>

        <!-- Mobile Bottom Nav -->
        <nav class="mobile-bottom-nav">
            <button class="mobile-nav-btn" onclick="openMarketScanner()">
                <span class="nav-icon">🔍</span>
                <span class="nav-label">Market</span>
            </button>
            <button class="mobile-nav-btn" onclick="handleLogout()">
                <span class="nav-icon">🚪</span>
                <span class="nav-label">Logout</span>
            </button>
        </nav>
    </div>

    <script src="script.js"></script>
</body>

</html>
