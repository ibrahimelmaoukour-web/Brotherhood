<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#161b22" />
  <g stroke="#58a6ff" stroke-width="1.5" fill="none">
    <!-- Clay Cross-Section -->
    <path d="M40,160 Q100,100 160,160 Z" fill="rgba(88, 166, 255, 0.1)" stroke-dasharray="2,2" />
    <!-- Hands -->
    <path d="M60,130 Q50,110 70,100 L90,120 M140,130 Q150,110 130,100 L110,120" stroke="#c9d1d9" stroke-width="2" />
    <!-- Action Arrows -->
    <path d="M100,80 L100,110 M95,105 L100,110 L105,105" stroke="#3fb950" stroke-width="2" />
    <text x="100" y="70" fill="#3fb950" font-family="JetBrains Mono" font-size="10" text-anchor="middle">KNEAD DOWN</text>
    <!-- Labels -->
    <text x="50" y="175" fill="#8b949e" font-family="JetBrains Mono" font-size="8">CLAY BED</text>
    <text x="150" y="175" fill="#8b949e" font-family="JetBrains Mono" font-size="8">WATER MIX</text>
  </g>
</svg>
