<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#161b22" />
  <g stroke="#c9d1d9" stroke-width="1.5" fill="none">
    <!-- Tripod Structure -->
    <path d="M100,40 L50,180" stroke="#8b949e" stroke-width="3" />
    <path d="M100,40 L150,180" stroke="#8b949e" stroke-width="3" />
    <path d="M100,40 L100,180" stroke="#8b949e" stroke-width="2" />
    
    <!-- Lashing Callout Bubble -->
    <circle cx="100" cy="40" r="10" stroke="#3fb950" stroke-width="2" />
    <path d="M110,40 L150,40" stroke="#3fb950" stroke-dasharray="2,2" />
    <text x="155" y="45" fill="#3fb950" font-family="JetBrains Mono" font-size="10">TRIPOD LASH</text>
    
    <!-- Weighted Point -->
    <path d="M90,120 L110,120 L110,150 L100,165 L90,150 Z" fill="rgba(88, 166, 255, 0.2)" stroke="#58a6ff" stroke-width="2" />
    <text x="115" y="140" fill="#58a6ff" font-family="JetBrains Mono" font-size="10">WEIGHTED ROCK</text>
    <text x="115" y="152" fill="#3fb950" font-family="JetBrains Mono" font-size="8">15.0 KG</text>
    
    <!-- Drop Arrow -->
    <path d="M80,100 L80,130" stroke="#ff4b2b" stroke-width="2" />
    <path d="M75,125 L80,130 L85,125" stroke="#ff4b2b" stroke-width="2" />
    <text x="75" y="95" fill="#ff4b2b" font-family="JetBrains Mono" font-size="10" text-anchor="middle">DROP</text>
  </g>
</svg>
