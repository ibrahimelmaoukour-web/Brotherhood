<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="300" fill="#161b22" />
  <g stroke="#58a6ff" stroke-width="1.5" fill="none" opacity="0.4">
    <!-- River Bed -->
    <path d="M0,150 Q100,100 200,150 T400,150" />
    <path d="M0,170 Q100,120 200,170 T400,170" stroke-dasharray="8,4" />
    <!-- Stones/Boulders -->
    <circle cx="50" cy="180" r="10" />
    <circle cx="150" cy="160" r="15" />
    <circle cx="280" cy="185" r="8" />
    <!-- Silt/Sediment -->
    <path d="M0,220 L400,220" stroke-dasharray="2,2" />
    <text x="350" y="290" fill="#58a6ff" font-family="JetBrains Mono" font-size="10" text-anchor="end">SURVEY: RIPARIAN / RIVERBED</text>
  </g>
</svg>
