<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <rect width="100%" height="100%" fill="#161b22" />
  <g stroke="#c9d1d9" stroke-width="1.5" fill="none">
    <!-- Flint Core -->
    <path d="M50,150 L100,50 L150,150 Z" stroke="#58a6ff" fill="rgba(88, 166, 255, 0.1)" stroke-width="2" />
    <path d="M70,120 L100,100 L130,120" stroke="#30363d" stroke-dasharray="2,1" />
    
    <!-- Hammerstone -->
    <path d="M90,30 Q110,10 130,30 L130,50 Q110,70 90,50 Z" fill="rgba(255,255,255,0.05)" />
    
    <!-- Impact Symbol and Arrow -->
    <path d="M110,50 L90,80" stroke="#ff4b2b" stroke-width="3" />
    <path d="M85,75 L90,80 L95,75" stroke="#ff4b2b" stroke-width="3" />
    
    <!-- Text Labels -->
    <text x="135" y="45" fill="#c9d1d9" font-family="JetBrains Mono" font-size="10">HAMMERSTONE</text>
    <text x="50" y="80" fill="#ff4b2b" font-family="JetBrains Mono" font-size="10">STRIKE (45°)</text>
    <text x="50" y="170" fill="#8b949e" font-family="JetBrains Mono" font-size="8">CORE FLINT</text>
    
    <!-- Detached Flake -->
    <path d="M40,160 L30,175" stroke="#3fb950" stroke-width="1.5" />
    <text x="20" y="190" fill="#3fb950" font-family="JetBrains Mono" font-size="8">RESULTING FLAKE</text>
  </g>
</svg>
